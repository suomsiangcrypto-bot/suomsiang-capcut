name: build-windows

# Build the Windows app automatically when you push to main,
# push a version tag (v1.0.0, v1.1.0, ...), or run it manually.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the .exe to a Release on tags

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows app (.exe)
        run: npx electron-builder --win --publish never

      - name: Upload build (download from the Actions run)
        uses: actions/upload-artifact@v4
        with:
          name: SUOMSIANG-CAPCUT-Windows
          path: dist/*.exe
          if-no-files-found: error

      - name: Attach .exe to GitHub Release (only on a vX.Y.Z tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
